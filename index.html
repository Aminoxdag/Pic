<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0, viewport-fit=cover">
  <title>لقطات شاشة عشوائية | فيديو إلى صور</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(165deg, #2d1f16 0%, #1a110c 30%, #231710 80%, #140d08 100%);
      font-family: 'Segoe UI', 'Tajawal', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1.5rem 1rem 2.5rem;
      margin: 0;
      color: #f0e2d0;
      position: relative;
      scroll-behavior: smooth;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(ellipse at 20% 30%, rgba(160, 110, 70, 0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(130, 85, 50, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app-container {
      max-width: 960px;
      width: 100%;
      background: rgba(36, 24, 17, 0.6);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 2.8rem;
      padding: 2rem 1.8rem;
      box-shadow: 0 30px 55px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 0 0 1px rgba(170, 120, 80, 0.25);
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      border: 1px solid rgba(190, 140, 95, 0.25);
    }

    h1 {
      text-align: center;
      font-weight: 400;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      color: #e8d5be;
      text-shadow: 0 4px 16px rgba(150, 100, 50, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    h1 span {
      background: rgba(130, 90, 55, 0.25);
      padding: 0.2rem 1.4rem;
      border-radius: 3rem;
      font-size: 1.8rem;
      color: #e0c19b;
      border: 1px solid rgba(190, 135, 85, 0.5);
      backdrop-filter: blur(6px);
    }

    .upload-area {
      background: rgba(28, 19, 13, 0.7);
      border: 2px dashed rgba(175, 125, 80, 0.5);
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 22px rgba(0,0,0,0.45);
    }
    .upload-area:hover {
      border-color: #c49868;
      background: rgba(38, 26, 18, 0.75);
    }

    .file-label {
      background: linear-gradient(135deg, #6d4e34, #4f3522);
      color: #fbeedb;
      padding: 0.9rem 2.4rem;
      border-radius: 2.8rem;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: 0.25s;
      border: 1px solid #ad8a64;
      box-shadow: 0 7px 16px rgba(100, 60, 25, 0.45);
      letter-spacing: 0.3px;
    }
    .file-label:hover {
      background: #8a6442;
      border-color: #d4ad7a;
      box-shadow: 0 9px 22px rgba(150, 90, 40, 0.6);
      transform: scale(1.01);
    }
    input[type="file"] { display: none; }

    .url-section {
      display: flex;
      width: 100%;
      gap: 0.7rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }
    .url-input {
      flex: 1 1 300px;
      background: rgba(26, 17, 10, 0.8);
      border: 1px solid #5e442e;
      border-radius: 2.8rem;
      padding: 0.85rem 1.6rem;
      font-size: 0.95rem;
      color: #f0ddc6;
      outline: none;
      backdrop-filter: blur(10px);
      transition: 0.25s;
      direction: ltr;
      text-align: left;
    }
    .url-input::placeholder { color: #a6896b; }
    .url-input:focus {
      border-color: #c7a172;
      box-shadow: 0 0 16px rgba(190, 130, 70, 0.5);
    }

    .btn {
      background: linear-gradient(135deg, #5f422b, #422c1c);
      border: none;
      color: #f9efe0;
      font-weight: 600;
      padding: 0.85rem 2rem;
      border-radius: 2.5rem;
      cursor: pointer;
      font-size: 0.95rem;
      border: 1px solid #8b6e4e;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 0.4px;
      backdrop-filter: blur(8px);
      box-shadow: 0 5px 12px rgba(70, 40, 18, 0.5);
    }
    .btn:hover {
      background: #735336;
      border-color: #ceaa7a;
      box-shadow: 0 9px 20px rgba(160, 100, 40, 0.55);
      transform: translateY(-2px);
    }
    .btn:active { transform: translateY(1px); }

    .video-preview {
      width: 100%;
      max-height: 270px;
      border-radius: 1.8rem;
      overflow: hidden;
      background: #0a0604;
      border: 1px solid #5c3f2b;
      display: none;
      box-shadow: 0 12px 22px rgba(0,0,0,0.6);
    }
    video {
      width: 100%;
      height: auto;
      max-height: 270px;
      object-fit: contain;
      background: #000;
      display: block;
    }

    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .gallery-header p {
      font-size: 1.15rem;
      color: #d6bd9c;
      font-weight: 500;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.4rem;
      margin-top: 0.5rem;
      padding-bottom: 1rem;
    }

    .screenshot-card {
      background: rgba(44, 30, 20, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 1.6rem;
      overflow: hidden;
      border: 1px solid #7e5f42;
      transition: transform 0.25s, box-shadow 0.3s;
      box-shadow: 0 12px 20px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }
    .screenshot-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 30px rgba(140, 90, 40, 0.35);
      border-color: #bf9a6c;
    }
    .screenshot-card img {
      width: 100%;
      display: block;
      object-fit: cover;
      aspect-ratio: 16 / 10;
      cursor: pointer;
      background: #1a1008;
    }
    .card-actions {
      display: flex;
      justify-content: center;
      padding: 0.65rem;
      background: rgba(22, 14, 8, 0.75);
      gap: 0.8rem;
    }
    .icon-btn {
      background: rgba(130, 90, 55, 0.55);
      border: none;
      color: #f2dbbc;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 0.4rem 0.85rem;
      border-radius: 2.2rem;
      transition: 0.25s;
      border: 1px solid #9c7c5a;
    }
    .icon-btn:hover { background: #8f6943; color: #fff; }

    .loading-indicator {
      text-align: center;
      color: #caaf88;
      padding: 1.8rem;
      display: none;
      font-size: 1rem;
    }

    /* وضع ملء الشاشة */
    .fullscreen-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(8, 5, 3, 0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 900;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .fullscreen-overlay.active { display: flex; }

    .fs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 1.2rem;
      width: 100%;
      height: 80vh;
      max-width: 1200px;
      margin: 0 auto;
    }
    .fs-card {
      background: #1e130b;
      border-radius: 1.8rem;
      overflow: hidden;
      border: 2px solid #8b6948;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }
    .fs-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .fs-card:hover { border-color: #d4aa72; }

    .fs-controls {
      display: flex;
      gap: 1.8rem;
      margin-top: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .fs-nav-btn {
      background: rgba(70, 45, 25, 0.8);
      border: 1px solid #b18a5e;
      color: #eedcc5;
      font-size: 2rem;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fs-nav-btn:hover { background: #8f6840; color: white; }
    .fs-close-btn {
      background: #4a3422;
      border: 1px solid #b58b5a;
      color: #f0dbc2;
      padding: 0.8rem 2rem;
      border-radius: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.25s;
    }
    .fs-close-btn:hover { background: #7b5a3b; }

    .lightbox-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 6, 3, 0.94);
      backdrop-filter: blur(14px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
    }
    .lightbox-overlay.active { display: flex; }
    .lightbox-content {
      position: relative;
      max-width: 92vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
    }
    .lightbox-content img {
      max-width: 100%;
      max-height: 72vh;
      object-fit: contain;
      border-radius: 2rem;
      box-shadow: 0 25px 50px black;
      border: 2px solid rgba(190, 140, 90, 0.5);
    }
    .lightbox-actions { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .lightbox-btn {
      background: rgba(55, 36, 22, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid #a88358;
      color: #f3e0c9;
      font-weight: 600;
      padding: 0.85rem 2rem;
      border-radius: 3rem;
      cursor: pointer;
    }
    .lightbox-btn:hover { background: #7d5838; }
    .close-lightbox {
      position: absolute;
      top: -0.8rem; right: -0.8rem;
      background: #422e1f;
      border: 1px solid #ad8457;
      color: #eed9be;
      width: 42px; height: 42px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
    }

    footer { margin-top: 0.8rem; color: #6b5a48; font-size: 0.8rem; z-index: 2; }

    @media (max-width: 600px) {
      .fs-grid { grid-template-columns: 1fr; grid-template-rows: repeat(4, 1fr); height: 85vh; }
      .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>لقطات <span>عشوائية</span></h1>

  <div class="upload-area">
    <label for="videoFile" class="file-label">اختر فيديو من الجهاز</label>
    <input type="file" id="videoFile" accept="video/*">
    <div class="url-section">
      <input type="text" class="url-input" id="videoUrl" placeholder="أدخل رابط فيديو مباشر (mp4, webm...)" dir="ltr">
      <button class="btn" id="loadUrlBtn">تحميل الرابط</button>
    </div>
    <div style="font-size:0.85rem; color:#b6976f;">يدعم روابط مباشرة بصيغة فيديو</div>
  </div>

  <div class="video-preview" id="videoPreviewContainer">
    <video id="videoPlayer" controls crossorigin="anonymous" playsinline></video>
  </div>

  <div class="gallery-header">
    <p>معرض الصور <span style="font-size:0.8rem; opacity:0.75;">(اسحب للأسفل للمزيد)</span></p>
    <div style="display: flex; gap: 0.7rem; flex-wrap: wrap;">
      <button class="btn" id="fullscreenBtn">وضع ملء الشاشة</button>
      <button class="btn" id="extractManualBtn">استخرج 5 صور</button>
      <button class="btn" id="clearGalleryBtn" style="background:#3e2a1b;">مسح</button>
    </div>
  </div>

  <div id="galleryContainer" class="gallery"></div>
  <div class="loading-indicator" id="loadingIndicator">جاري استخراج لقطات جديدة...</div>
</div>

<!-- وضع ملء الشاشة -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
  <div class="fs-grid" id="fsGrid"></div>
  <div class="fs-controls">
    <button class="fs-nav-btn" id="fsPrevBtn">&#8592;</button>
    <span style="color:#caaf88; font-weight:500;" id="fsPageIndicator">1 / 1</span>
    <button class="fs-nav-btn" id="fsNextBtn">&#8594;</button>
    <button class="fs-close-btn" id="fsCloseBtn">خروج من الملء</button>
  </div>
</div>

<!-- نافذة المعاينة المنبثقة -->
<div class="lightbox-overlay" id="lightboxOverlay">
  <div class="lightbox-content">
    <button class="close-lightbox" id="closeLightboxBtn">✕</button>
    <img id="lightboxImage" src="" alt="معاينة">
    <div class="lightbox-actions">
      <button class="lightbox-btn" id="lightboxDownloadBtn">تحميل الصورة</button>
      <button class="lightbox-btn" id="lightboxCloseBtn">خروج</button>
    </div>
    <p style="color:#b6976f;" id="lightboxTime"></p>
  </div>
</div>

<footer>معاينة وتحميل الصور بجودة عالية</footer>

<script>
  (() => {
    const videoFileInput = document.getElementById('videoFile');
    const videoUrlInput = document.getElementById('videoUrl');
    const loadUrlBtn = document.getElementById('loadUrlBtn');
    const videoPlayer = document.getElementById('videoPlayer');
    const videoPreviewContainer = document.getElementById('videoPreviewContainer');
    const galleryContainer = document.getElementById('galleryContainer');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const clearGalleryBtn = document.getElementById('clearGalleryBtn');
    const extractManualBtn = document.getElementById('extractManualBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    const lightboxOverlay = document.getElementById('lightboxOverlay');
    const lightboxImage = document.getElementById('lightboxImage');
    const lightboxTime = document.getElementById('lightboxTime');
    const closeLightboxBtn = document.getElementById('closeLightboxBtn');
    const lightboxDownloadBtn = document.getElementById('lightboxDownloadBtn');
    const lightboxCloseBtn = document.getElementById('lightboxCloseBtn');

    const fullscreenOverlay = document.getElementById('fullscreenOverlay');
    const fsGrid = document.getElementById('fsGrid');
    const fsPrevBtn = document.getElementById('fsPrevBtn');
    const fsNextBtn = document.getElementById('fsNextBtn');
    const fsCloseBtn = document.getElementById('fsCloseBtn');
    const fsPageIndicator = document.getElementById('fsPageIndicator');

    let videoLoaded = false;
    let isExtracting = false;
    const MAX_IMAGES = 80;
    let currentLightboxData = null;
    
    // حالة ملء الشاشة
    let fsImages = [];
    let fsCurrentPage = 0;
    const FS_PER_PAGE = 4;

    function loadVideoFromFile(file) {
      if (!file || !file.type.startsWith('video/')) return alert('ملف فيديو غير صالح');
      const url = URL.createObjectURL(file);
      setVideoSource(url, file.name);
    }

    function setVideoSource(url, name = '') {
      stopVideo();
      if (videoPlayer.src?.startsWith('blob:')) URL.revokeObjectURL(videoPlayer.src);
      videoPlayer.src = url;
      videoPlayer.load();
      videoPreviewContainer.style.display = 'block';
      videoPlayer.onloadedmetadata = () => { videoLoaded = true; };
      videoPlayer.onerror = () => {
        alert('تعذر تحميل الفيديو');
        videoLoaded = false;
        videoPreviewContainer.style.display = 'none';
      };
      if (videoPlayer.readyState >= 2) videoLoaded = true;
    }

    function stopVideo() { videoPlayer.pause(); videoPlayer.currentTime = 0; }

    function loadVideoFromUrl() {
      const url = videoUrlInput.value.trim();
      if (!url) return alert('أدخل رابط الفيديو');
      if (!url.startsWith('http')) return alert('رابط غير صحيح');
      setVideoSource(url);
    }

    function captureRandomFrame() {
      return new Promise((resolve, reject) => {
        if (!videoLoaded || !videoPlayer.videoWidth || !videoPlayer.duration) return reject(new Error('الفيديو غير جاهز'));
        const duration = videoPlayer.duration;
        if (duration <= 0.2) return reject(new Error('مدة قصيرة'));
        const randomTime = Math.random() * (duration - 0.3);
        const onSeeked = () => {
          videoPlayer.removeEventListener('seeked', onSeeked);
          const canvas = document.createElement('canvas');
          canvas.width = videoPlayer.videoWidth;
          canvas.height = videoPlayer.videoHeight;
          canvas.getContext('2d').drawImage(videoPlayer, 0, 0);
          resolve({ dataUrl: canvas.toDataURL('image/jpeg', 0.93), time: randomTime });
        };
        videoPlayer.addEventListener('seeked', onSeeked);
        try { videoPlayer.currentTime = randomTime; } catch (e) { videoPlayer.removeEventListener('seeked', onSeeked); reject(e); }
      });
    }

    function openLightbox(data) {
      currentLightboxData = data;
      lightboxImage.src = data.dataUrl;
      lightboxTime.textContent = `${data.time.toFixed(2)} ثانية`;
      lightboxOverlay.classList.add('active');
    }
    function closeLightbox() { lightboxOverlay.classList.remove('active'); }

    function createCard(data) {
      const card = document.createElement('div'); card.className = 'screenshot-card';
      const img = document.createElement('img'); img.src = data.dataUrl; img.loading = 'lazy';
      img.addEventListener('click', () => openLightbox(data));
      const dnBtn = document.createElement('button'); dnBtn.className = 'icon-btn'; dnBtn.innerHTML = '&#8595;';
      dnBtn.addEventListener('click', (e) => { e.stopPropagation(); const a = document.createElement('a'); a.href = data.dataUrl; a.download = `لقطة_${Date.now()}.jpg`; a.click(); });
      const actions = document.createElement('div'); actions.className = 'card-actions'; actions.appendChild(dnBtn);
      card.append(img, actions);
      return card;
    }

    async function addImages(count = 6) {
      if (!videoLoaded) return alert('حمّل فيديو أولاً');
      if (isExtracting) return;
      isExtracting = true; loadingIndicator.style.display = 'block';
      for (let i = 0; i < count; i++) {
        if (galleryContainer.children.length >= MAX_IMAGES) { alert('الحد الأقصى للصور'); break; }
        try { const d = await captureRandomFrame(); galleryContainer.appendChild(createCard(d)); } catch (e) { console.warn(e); }
      }
      loadingIndicator.style.display = 'none'; isExtracting = false;
    }

    function scrollHandler() {
      if (isExtracting || !videoLoaded) return;
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 180) addImages(6);
    }

    // وضع ملء الشاشة
    function collectAllImages() {
      return Array.from(galleryContainer.querySelectorAll('img')).map(img => img.src);
    }

    function renderFullscreenPage() {
      fsGrid.innerHTML = '';
      const start = fsCurrentPage * FS_PER_PAGE;
      const pageImages = fsImages.slice(start, start + FS_PER_PAGE);
      pageImages.forEach(src => {
        const card = document.createElement('div'); card.className = 'fs-card';
        const img = document.createElement('img'); img.src = src;
        card.appendChild(img);
        card.addEventListener('click', () => {
          const tempData = { dataUrl: src, time: 0 };
          openLightbox(tempData);
        });
        fsGrid.appendChild(card);
      });
      const totalPages = Math.ceil(fsImages.length / FS_PER_PAGE) || 1;
      fsPageIndicator.textContent = `${fsCurrentPage + 1} / ${totalPages}`;
    }

    function openFullscreen() {
      fsImages = collectAllImages();
      if (fsImages.length === 0) return alert('لا توجد صور في المعرض. استخرج صوراً أولاً.');
      fsCurrentPage = 0;
      renderFullscreenPage();
      fullscreenOverlay.classList.add('active');
    }

    function closeFullscreen() { fullscreenOverlay.classList.remove('active'); }
    function fsNext() { if (fsImages.length === 0) return; const max = Math.ceil(fsImages.length / FS_PER_PAGE) - 1; if (fsCurrentPage < max) { fsCurrentPage++; renderFullscreenPage(); } }
    function fsPrev() { if (fsCurrentPage > 0) { fsCurrentPage--; renderFullscreenPage(); } }

    // الأحداث
    videoFileInput.addEventListener('change', e => { const f = e.target.files[0]; if (f) { loadVideoFromFile(f); videoUrlInput.value = ''; galleryContainer.innerHTML = ''; } });
    loadUrlBtn.addEventListener('click', () => { videoFileInput.value = ''; loadVideoFromUrl(); galleryContainer.innerHTML = ''; });
    videoUrlInput.addEventListener('keypress', e => { if (e.key === 'Enter') loadUrlBtn.click(); });
    clearGalleryBtn.addEventListener('click', () => { galleryContainer.innerHTML = ''; });
    extractManualBtn.addEventListener('click', () => addImages(5));
    fullscreenBtn.addEventListener('click', openFullscreen);
    fsCloseBtn.addEventListener('click', closeFullscreen);
    fsNextBtn.addEventListener('click', fsNext);
    fsPrevBtn.addEventListener('click', fsPrev);
    closeLightboxBtn.addEventListener('click', closeLightbox);
    lightboxCloseBtn.addEventListener('click', closeLightbox);
    lightboxDownloadBtn.addEventListener('click', () => { if (currentLightboxData) { const a = document.createElement('a'); a.href = currentLightboxData.dataUrl; a.download = `لقطة_${Date.now()}.jpg`; a.click(); } });
    lightboxOverlay.addEventListener('click', e => { if (e.target === lightboxOverlay) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeLightbox(); closeFullscreen(); } });
    window.addEventListener('scroll', scrollHandler, { passive: true });
    window.addEventListener('beforeunload', () => { if (videoPlayer.src?.startsWith('blob:')) URL.revokeObjectURL(videoPlayer.src); });
  })();
</script>
</body>
</html>
